server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # Đọc các file cấu hình dùng chung trong classpath:/config/
          search-locations: classpath:/config/

management:
  endpoints:
    web:
      exposure:
        include: health,info
