# =====================================================================
# Cấu hình DÙNG CHUNG cho TẤT CẢ service (config-server phục vụ file này).
# Mọi service import config-server sẽ tự động nhận các giá trị dưới đây.
# Service nào cần override thì khai trong application.yml riêng của nó.
# =====================================================================

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0   # Lấy mẫu 100% trace cho môi trường học/dev
  observations:
    key-values:
      application: ${spring.application.name}

# Cấu hình Kafka dùng chung
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.shopmicro.common.event"
    producer:
      properties:
        spring.json.add.type.headers: true
