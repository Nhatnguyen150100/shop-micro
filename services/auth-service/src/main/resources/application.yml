server:
  port: 8081

spring:
  application:
    name: auth-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/authdb
    username: ${DB_USER:shopmicro}
    password: ${DB_PASS:shopmicro}
  jpa:
    hibernate:
      ddl-auto: update    # Học/dev cho nhanh; production nên dùng Flyway
    open-in-view: false
    properties:
      hibernate.format_sql: true

jwt:
  # PHẢI trùng với jwt.secret bên api-gateway
  secret: ${JWT_SECRET:U2hvcE1pY3JvU3VwZXJTZWNyZXRLZXlGb3JKV1RIUzI1NkFsZ29yaXRobTEyMzQ1Njc4OTA=}
  expiration: ${JWT_EXPIRATION:86400000}   # 24 giờ (ms)

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
